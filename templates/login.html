{% extends "layout.html" %}

{% block content %}
  <section class="hero" style="max-width:520px;margin:4rem auto;">
    <h1>Sign in</h1>
    <p>Please authenticate to access the GDPR Control Center.</p>
    <form method="post" class="panel" style="margin-top:1.5rem;" autocomplete="off">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="field-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus autocomplete="off" />
      </div>
      <div class="field-group" style="margin-top:1rem;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" />
      </div>
      {% if error %}
        <div class="notice" style="background-color:#fee2e2;border-color:#dc2626; margin-top:1rem;">{{ error }}</div>
      {% endif %}
      <button class="btn" type="submit" style="margin-top:1.5rem;">Sign in</button>
    </form>
  </section>
{% endblock %}
