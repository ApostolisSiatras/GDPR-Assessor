{% extends "layout.html" %}

{% block content %}
  <section class="hero" style="max-width:520px;margin:4rem auto;">
    <h1>Download unlock</h1>
    <p>Enter the download password to export files.</p>
    <form method="post" class="panel" style="margin-top:1.5rem;">
      <div class="field-group">
        <label for="download_password">Download password</label>
        <input type="password" id="download_password" name="download_password" required autofocus />
      </div>
      {% if error %}
        <div class="notice" style="background-color:#fee2e2;border-color:#dc2626; margin-top:1rem;">{{ error }}</div>
      {% endif %}
      <button class="btn" type="submit" style="margin-top:1.5rem;">Unlock downloads</button>
    </form>
  </section>
{% endblock %}
